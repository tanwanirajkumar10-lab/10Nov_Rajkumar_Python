{% extends 'q13_base.html' %}

{% block title %}Account Login{% endblock %}

{% block content %}
<div class="max-w-md w-full">
    <div class="bg-slate-900/50 backdrop-blur-2xl border border-slate-800 rounded-[3rem] p-8 md:p-10 shadow-2xl">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-[2.5rem] bg-indigo-500/10 text-indigo-400 mb-6 border border-indigo-500/20">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
            </div>
            <h2 class="text-3xl font-heading font-bold text-white mb-2 leading-6">Welcome Back</h2>
            <p class="text-slate-500 text-sm leading-6">Login to access your doctor dashboard.</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-widest text-slate-600 ml-1">Email Address</label>
                <div class="relative">
                    <input type="email" name="email" placeholder="doctor@example.com" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 pl-12 text-white focus:outline-none focus:border-indigo-500/50 transition-all font-medium" required>
                    <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-600 leading-6">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-widest text-slate-600 ml-1">Secure Password</label>
                <div class="relative">
                    <input type="password" name="password" placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 pl-12 text-white focus:outline-none focus:border-indigo-500/50 transition-all font-medium" required>
                    <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-600 leading-6">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl transition-all shadow-xl shadow-indigo-500/20 transform hover:-translate-y-1 active:translate-y-0 mt-4 leading-6">
                Authorize Access
            </button>
        </form>

        <p class="text-sm text-center mt-10 text-slate-500 leading-6">
            Don’t have an account? 
            <a href="/q13/q13_signup" class="text-indigo-400 font-bold hover:text-indigo-300 transition-colors">Create one now</a>
        </p>
    </div>
</div>
{% endblock %}
