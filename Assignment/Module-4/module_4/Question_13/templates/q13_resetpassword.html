{% extends 'q13_base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="max-w-md w-full">
    <div class="bg-slate-900/50 backdrop-blur-2xl border border-slate-800 rounded-[3rem] p-8 md:p-12 shadow-2xl">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-[2.5rem] bg-indigo-500/10 text-indigo-400 mb-6 border border-indigo-500/20">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
            </div>
            <h2 class="text-3xl font-heading font-bold text-white mb-2 leading-6">Security Reset</h2>
            <p class="text-slate-500 text-sm leading-6">Enter your new secure access credentials below.</p>
        </div>

    <form method="POST" class="space-y-6">
        {% csrf_token %}

        <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-600 ml-1">New Secure Password</label>
            <div class="relative">
                <input type="password" name="password" placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 pl-12 text-white focus:outline-none focus:border-indigo-500/50 transition-all font-medium" required>
                <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-600 leading-6">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                </div>
            </div>
        </div>

        <button type="submit" class="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl transition-all shadow-xl shadow-indigo-500/20 transform hover:-translate-y-1 active:translate-y-0 mt-4 leading-6">
            Secure Credentials
        </button>
    </form>

    <div class="mt-8 text-center leading-6">
        <a href="/q13/q13_home" class="text-xs font-bold uppercase tracking-widest text-slate-600 hover:text-white transition-colors">Return Home</a>
    </div>

    </div>
</div>
{% endblock %}
