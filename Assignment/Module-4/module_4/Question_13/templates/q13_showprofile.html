{% extends 'q13_base.html' %}

{% block title %}Professional Profile{% endblock %}

{% block content %}
<div class="max-w-md w-full">
    <div class="bg-slate-900/50 backdrop-blur-2xl border border-slate-800 rounded-[3rem] p-8 md:p-12 shadow-2xl overflow-hidden">
        
        <div class="text-center mb-10">
            <div class="relative inline-block">
                <div class="w-32 h-32 rounded-[2.5rem] bg-indigo-500/10 text-indigo-400 mb-6 border border-indigo-500/20 flex items-center justify-center">
                    <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                </div>
                <div class="absolute bottom-6 right-0 w-8 h-8 rounded-xl bg-emerald-500 border-4 border-slate-900 flex items-center justify-center text-white">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                </div>
            </div>
            <h2 class="text-3xl font-heading font-bold text-white mb-1 leading-6">{{ stdata.name }}</h2>
            <p class="text-slate-500 text-sm font-bold uppercase tracking-widest leading-6">Medical Professional</p>
        </div>

        <div class="space-y-4 mb-10">
            <div class="p-4 rounded-2xl bg-slate-950 border border-slate-800/50 flex flex-col gap-1">
                <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-600 leading-6">Secure Email</span>
                <span class="text-slate-200 font-medium leading-6">{{ stdata.email }}</span>
            </div>
            <div class="p-4 rounded-2xl bg-slate-950 border border-slate-800/50 flex flex-col gap-1">
                <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-600 leading-6">Direct Line</span>
                <span class="text-slate-200 font-medium leading-6">{{ stdata.phone }}</span>
            </div>
        </div>

        <div class="flex flex-col gap-3">
            <a href="/q13/q13_updateprofile/{{ stdata.id }}" class="flex items-center justify-center gap-3 w-full py-4 bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold rounded-2xl transition-all shadow-xl shadow-amber-500/10 leading-6">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                Update Profile
            </a>
            <a href="/q13/q13_resetpassword" class="flex items-center justify-center px-4 py-3 text-slate-500 hover:text-white transition-colors text-sm font-bold uppercase tracking-widest leading-6">
                Security Settings
            </a>
        </div>

    </div>
</div>
{% endblock %}
