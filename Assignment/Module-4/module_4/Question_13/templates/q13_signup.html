{% extends 'q13_base.html' %}

{% block title %}Create Account{% endblock %}

{% block content %}
<div class="max-w-md w-full">
    <div class="bg-slate-900/50 backdrop-blur-2xl border border-slate-800 rounded-[3rem] p-8 md:p-12 shadow-2xl">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-[2.5rem] bg-indigo-500/10 text-indigo-400 mb-6 border border-indigo-500/20">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <h2 class="text-3xl font-heading font-bold text-white mb-2 leading-6">Join the Network</h2>
            <p class="text-slate-500 text-sm leading-6">Establish your professional presence today.</p>
        </div>

    <form method="POST" class="space-y-5">
        {% csrf_token %}

        <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-600 ml-1">Full Name</label>
            <input type="text" name="name" placeholder="Dr. John Doe" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-indigo-500/50 transition-all font-medium">
        </div>

        <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-600 ml-1">Professional Email</label>
            <input type="email" name="email" placeholder="doctor@hospital.com" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-indigo-500/50 transition-all font-medium" required>
        </div>

        <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-600 ml-1">Contact Number</label>
            <input type="tel" name="phone" placeholder="+91 000 000 0000" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-indigo-500/50 transition-all font-medium">
        </div>

        <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-600 ml-1">Secure Password</label>
            <input type="password" name="password" placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-indigo-500/50 transition-all font-medium" required>
        </div>

        <button type="submit" class="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl transition-all shadow-xl shadow-indigo-500/20 transform hover:-translate-y-1 active:translate-y-0 mt-4 leading-6">
            Initialize Profile
        </button>
    </form>

    <p class="text-sm text-center mt-10 text-slate-500 leading-6">
        Already registered? 
        <a href="/q13" class="text-indigo-400 font-bold hover:text-indigo-300 transition-colors">Authorize Login</a>
    </p>
    </div>
</div>
{% endblock %}
