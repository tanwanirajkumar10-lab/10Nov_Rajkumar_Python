<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question 12 | Record Update</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-[#0f172a] min-h-screen flex flex-col font-sans text-slate-200">
    <!-- Mini Navbar -->
    <nav class="p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/q12/q12_showdata" class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                <span class="font-medium font-heading tracking-wide">Back to Directory</span>
            </a>
            <span class="text-xs font-bold uppercase tracking-widest text-slate-500">Module 4 / Q12 / Edit</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="max-w-4xl w-full grid grid-cols-1 lg:grid-cols-5 gap-8 items-start">
            
            <!-- Info Side -->
            <div class="lg:col-span-2 text-center lg:text-left py-10 lg:py-20">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-amber-500/20 text-amber-400 mb-6 border border-amber-500/30">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                </div>
                <h1 class="text-4xl md:text-5xl font-heading font-bold text-white mb-6 leading-tight">Modify <br><span class="text-amber-400">Record Data</span></h1>
                <p class="text-slate-400 mb-8 leading-relaxed">Update existing profile attributes. Ensure all modified details maintain structural compliance before submission.</p>
                
                <div class="inline-flex items-center gap-3 px-4 py-3 rounded-xl bg-slate-800/50 border border-slate-700/50 text-sm">
                    <span class="w-2 h-2 rounded-full bg-amber-500"></span>
                    <span class="text-slate-300 font-mono">Editing: {{stid.name}}</span>
                </div>
            </div>

            <!-- Form Side -->
            <div class="lg:col-span-3 glass p-8 md:p-10 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                <!-- Highlight accent for update context -->
                <div class="absolute top-0 left-0 w-full h-1 bg-amber-500"></div>

                <form method="post" class="space-y-5">
                    {% csrf_token %}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Full Name</label>
                            <input type="text" name="name" value="{{stid.name}}" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500/50 transition-all font-medium" required>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Specialization</label>
                            <input type="text" name="specialization" value="{{stid.specialization}}" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500/50 transition-all font-medium" required>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Qualification</label>
                            <input type="text" name="qualification" value="{{stid.qualification}}" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500/50 transition-all font-medium">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Experience</label>
                            <input type="text" name="experience" value="{{stid.experience}}" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500/50 transition-all font-medium">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Hospital / Clinic</label>
                        <input type="text" name="hospital" value="{{stid.hospital}}" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500/50 transition-all font-medium">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Phone Number</label>
                            <input type="number" name="phone" value="{{stid.phone}}" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500/50 transition-all font-medium [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Email Address</label>
                            <input type="email" name="email" value="{{stid.email}}" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500/50 transition-all font-medium">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Professional Bio</label>
                        <textarea name="bio" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500/50 transition-all resize-none font-medium">{{stid.bio}}</textarea>
                    </div>

                    <button type="submit" class="w-full py-4 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold rounded-2xl transition-all shadow-lg shadow-amber-500/20 transform hover:-translate-y-0.5 active:translate-y-0 text-center">
                        Sync Updates
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="p-10 text-center opacity-30 text-xs font-medium uppercase tracking-widest text-slate-500">
        Record Alteration Handler
    </footer>
</body>
</html>
