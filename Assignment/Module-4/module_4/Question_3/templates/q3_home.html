<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 | Patient Registration</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-950 min-h-screen flex flex-col font-sans text-slate-200">
    <!-- Navbar -->
    <nav class="p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="{% url 'home' %}" class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                <span class="font-medium font-heading">Dashboard</span>
            </a>
            <span class="text-xs font-bold uppercase tracking-widest text-slate-500">Module 4 / Q3</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 py-8">
        <div class="max-w-md w-full">
            <div class="bg-slate-900 border border-slate-800 rounded-[2.5rem] p-8 md:p-10 shadow-2xl">
                <div class="text-center mb-10">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-3xl bg-blue-500/10 text-blue-400 mb-4 border border-blue-500/20">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    </div>
                    <h2 class="text-3xl font-heading font-bold text-white mb-2 leading-6">Patient Registration</h2>
                    <p class="text-slate-500 text-sm leading-6">Fill in the details below to secure your medical record.</p>
                </div>

                <form id="patientForm" onsubmit="return validateForm()" class="space-y-5">
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Full Name</label>
                        <input type="text" id="name" placeholder="John Doe" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500/50 transition-all">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Age</label>
                            <input type="number" id="age" placeholder="25" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500/50 transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Gender</label>
                            <select id="gender" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500/50 transition-all appearance-none">
                                <option value="">Select</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Email Address</label>
                        <input type="text" id="email" placeholder="john@example.com" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500/50 transition-all">
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Phone Number</label>
                        <input type="text" id="phone" placeholder="10 Digit Number" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500/50 transition-all">
                    </div>

                    <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl transition-all shadow-lg shadow-blue-500/20 transform hover:-translate-y-0.5 mt-4">
                        Register Account
                    </button>
                </form>

                <div id="error-container" class="mt-6 min-h-[1.5rem] text-center">
                    <p id="error" class="text-red-400 text-sm font-medium leading-6"></p>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-10 text-center opacity-30 text-xs font-medium uppercase tracking-widest text-slate-500 leading-6">
        Client-Side Logic Module
    </footer>

    <script>
    function validateForm() {
      let name = document.getElementById("name").value.trim();
      let age = document.getElementById("age").value;
      let email = document.getElementById("email").value.trim();
      let phone = document.getElementById("phone").value.trim();
      let gender = document.getElementById("gender").value;
      let error = document.getElementById("error");

      error.innerHTML = "";

      if (name === "") {
        error.innerHTML = "Name is required";
        return false;
      }

      if (age === "" || age <= 0 || age > 120) {
        error.innerHTML = "Enter a valid age (1-120)";
        return false;
      }

      let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
      if (!email.match(emailPattern)) {
        error.innerHTML = "Enter a valid email";
        return false;
      }

      let phonePattern = /^[0-9]{10}$/;
      if (!phone.match(phonePattern)) {
        error.innerHTML = "Enter a valid 10-digit phone number";
        return false;
      }

      if (gender === "") {
        error.innerHTML = "Please select gender";
        return false;
      }

      alert("Form submitted successfully!");
      return true;
    }
    </script>
</body>
</html>
