<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Locations | Question_20</title>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <!-- Leaflet CSS for OpenStreetMap -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --text: #f8fafc;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            background-color: #f1f5f9;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-radius: 16px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #1e293b;
            font-weight: 600;
        }

        .header p {
            margin: 4px 0 0 0;
            font-size: 0.9rem;
            color: #64748b;
        }

        .info-window {
            padding: 12px;
            color: #1e293b;
        }

        .info-window h3 {
            margin: 0 0 4px 0;
            font-size: 1.1rem;
            color: var(--primary);
        }

        .info-window p {
            margin: 0;
            font-size: 0.9rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" style="display: flex; align-items: center; gap: 6px; text-decoration: none; color: #64748b; margin-bottom: 12px; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; transition: color 0.2s ease;" onmouseover="this.style.color='#1e293b'" onmouseout="this.style.color='#64748b'">
            <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Back to dashboard
        </a>
        <h1>Doctor Network</h1>
        <p>Showing doctors in Rajkot, Gujarat</p>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        // Init Map Centered on Rajkot
        const rajkot = [22.3039, 70.8022];
        const map = L.map('map').setView(rajkot, 13);

        // Add Premium Voyager Tiles (CartoDB) - Highly compatible and clear
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Doctor Data from Django
        const doctors = [
            {% for doctor in doctors %}
            {
                name: "{{ doctor.name }}",
                specialization: "{{ doctor.specialization }}",
                lat: {{ doctor.latitude }},
                lng: {{ doctor.longitude }}
            },
            {% endfor %}
        ];

        // Add Markers
        doctors.forEach(doctor => {
            const marker = L.marker([doctor.lat, doctor.lng]).addTo(map);
            
            const content = `
                <div class="info-window">
                    <h3>${doctor.name}</h3>
                    <p>${doctor.specialization}</p>
                </div>
            `;
            marker.bindPopup(content);
        });
    </script>
</body>
</html>
