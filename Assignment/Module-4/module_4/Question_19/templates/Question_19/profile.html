<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q19 | User Profile</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#020617] min-h-screen flex flex-col font-sans text-slate-200">
    <!-- Navbar -->
    <nav class="p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/" class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                <span class="font-medium font-heading">Dashboard</span>
            </a>
            <span class="text-xs font-bold uppercase tracking-widest text-slate-600">Module 4 / Q19</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 py-8">
        <div class="max-w-md w-full">
            <div class="bg-slate-900/50 backdrop-blur-3xl border border-slate-800 rounded-[3rem] p-8 md:p-12 shadow-2xl overflow-hidden relative">
                <!-- Decorative Glow -->
                <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-indigo-500/10 rounded-full blur-3xl"></div>
                
                <div class="text-center mb-10 relative">
                    <div class="relative inline-block mb-6">
                        {% if user.socialaccount_set.all.0.get_avatar_url %}
                            <img src="{{ user.socialaccount_set.all.0.get_avatar_url }}" alt="Avatar" class="w-32 h-32 rounded-[2.5rem] object-cover border-4 border-slate-950 shadow-2xl mx-auto">
                        {% else %}
                            <img src="https://ui-avatars.com/api/?name={{ user.get_full_name|default:user.username }}&background=6366f1&color=fff&size=128" alt="Avatar" class="w-32 h-32 rounded-[2.5rem] object-cover border-4 border-slate-950 shadow-2xl mx-auto">
                        {% endif %}
                        <div class="absolute -bottom-2 -right-2 w-10 h-10 rounded-2xl bg-indigo-600 border-4 border-slate-900 flex items-center justify-center text-white shadow-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                        </div>
                    </div>
                    
                    <h1 class="text-3xl font-heading font-bold text-white mb-2 leading-6">Hello, {{ user.first_name|default:user.username }}!</h1>
                    <p class="text-indigo-400 text-sm font-bold uppercase tracking-widest leading-6">Authenticated Identity</p>
                </div>

                <div class="space-y-4 mb-10 relative">
                    <div class="p-5 rounded-2xl bg-slate-950 border border-slate-800/50 flex flex-col gap-1">
                        <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-600 leading-6">System Email</span>
                        <span class="text-slate-200 font-medium truncate leading-6">{{ user.email }}</span>
                    </div>
                    <div class="p-5 rounded-2xl bg-slate-950 border border-slate-800/50 flex flex-col gap-1">
                        <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-600 leading-6">Account Status</span>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="w-2 h-2 rounded-full bg-emerald-500 leading-6"></span>
                            <span class="text-emerald-400 font-bold text-xs uppercase tracking-wider leading-6">Verified Member</span>
                        </div>
                    </div>
                </div>

                <a href="{% url 'logout' %}" class="flex items-center justify-center gap-3 w-full py-5 bg-red-500/10 hover:bg-red-500 border border-red-500/20 text-red-500 hover:text-white font-bold rounded-2xl transition-all mb-4 mt-6 leading-6">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
                    Terminate Session
                </a>
            </div>
        </div>
    </main>

    <footer class="p-10 text-center opacity-30 text-xs font-medium uppercase tracking-widest text-slate-600 leading-6">
        Secure Profile Management
    </footer>
</body>
</html>
