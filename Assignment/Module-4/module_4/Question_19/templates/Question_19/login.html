{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q19 | Secure Authentication</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#020617] min-h-screen flex flex-col font-sans text-slate-200">
    <!-- Navbar -->
    <nav class="p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/" class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                <span class="font-medium font-heading">Dashboard</span>
            </a>
            <span class="text-xs font-bold uppercase tracking-widest text-slate-600">Module 4 / Q19</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 py-8">
        <div class="max-w-md w-full">
            <div class="bg-slate-900/50 backdrop-blur-3xl border border-slate-800 rounded-[3rem] p-8 md:p-12 shadow-2xl relative overflow-hidden">
                <!-- Decorative element -->
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-600/10 rounded-full blur-3xl"></div>
                
                <div class="text-center mb-10 relative">
                    <div class="inline-flex items-center justify-center w-20 h-20 rounded-[2.5rem] bg-indigo-500/10 text-indigo-400 mb-6 border border-indigo-500/20 shadow-inner">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
                    </div>
                    <h2 class="text-3xl font-heading font-bold text-white mb-2 leading-6">Secure Access</h2>
                    <p class="text-slate-500 text-sm leading-6">Identify yourself to continue to the portal.</p>
                </div>

                <form action="{% url 'login' %}" method="POST" class="space-y-5 relative">
                    {% csrf_token %}
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-600 ml-1">Username</label>
                        <input type="text" id="username" name="username" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-indigo-500/50 transition-all font-medium" required>
                    </div>
                    
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-600 ml-1">Password</label>
                        <input type="password" id="password" name="password" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-indigo-500/50 transition-all font-medium" required>
                    </div>
                    
                    <button type="submit" class="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl transition-all shadow-xl shadow-indigo-500/20 transform hover:-translate-y-1 active:translate-y-0 leading-6">
                        Internal Authorization
                    </button>

                    <div class="relative py-4">
                        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-800"></div></div>
                        <div class="relative flex justify-center text-xs uppercase"><span class="bg-slate-900/50 px-2 text-slate-600 font-bold tracking-widest">or social login</span></div>
                    </div>

                    <div class="grid grid-cols-1 gap-3">
                        <a href="{% provider_login_url 'github' %}" class="flex items-center justify-center gap-3 py-4 bg-slate-800 hover:bg-slate-700 text-white font-semibold rounded-2xl transition-all border border-slate-700 hover:border-slate-600 leading-6">
                            <i class="fab fa-github text-xl"></i>
                            <span class="text-sm">Continue with GitHub</span>
                        </a>
                        
                        <a href="{% provider_login_url 'google' %}" class="flex items-center justify-center gap-3 py-4 bg-white hover:bg-slate-100 text-slate-900 font-bold rounded-2xl transition-all leading-6">
                            <i class="fab fa-google text-xl text-red-500"></i>
                            <span class="text-sm">Authorize Google ID</span>
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="p-10 text-center opacity-30 text-xs font-medium uppercase tracking-widest text-slate-600 leading-6">
        OAuth 2.0 & Social Integration
    </footer>
</body>
</html>
