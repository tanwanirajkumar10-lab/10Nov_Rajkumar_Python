<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q16 | Book Appointment</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#020617] min-h-screen flex flex-col font-sans text-slate-200">
    <!-- Navbar -->
    <nav class="p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="javascript:history.back()" class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                <span class="font-medium font-heading">Back to Directory</span>
            </a>
            <span class="text-xs font-bold uppercase tracking-widest text-slate-600">Module 4 / Q16</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 py-8">
        <div class="max-w-md w-full">
            <div class="bg-slate-900/50 backdrop-blur-3xl border border-slate-800 rounded-[3rem] p-8 md:p-12 shadow-2xl relative overflow-hidden">
                <!-- Decorative element -->
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-600/10 rounded-full blur-3xl"></div>
                
                <div class="text-center mb-10 relative">
                    <div class="inline-flex items-center justify-center w-20 h-20 rounded-[2.5rem] bg-blue-500/10 text-blue-400 mb-6 border border-blue-500/20 shadow-inner">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    </div>
                    <h2 class="text-3xl font-heading font-bold text-white mb-2 leading-6">Book Session</h2>
                    <p class="text-slate-500 text-sm leading-6">Complete scheduling with {{ doctor.name }}.</p>
                </div>

                <form method="post" class="space-y-6 relative">
                    {% csrf_token %}
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-600 ml-1">Patient Name</label>
                        <input type="text" id="patient_name" name="patient_name" placeholder="Enter full name" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-blue-500/50 transition-all font-medium" required>
                    </div>
                    
                    <div class="p-5 rounded-2xl bg-slate-950 border border-slate-800/50 flex items-center justify-between">
                        <div class="flex flex-col gap-1">
                            <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-600 leading-6">Consultation Fee</span>
                            <span class="text-emerald-400 font-bold text-lg leading-6">₹500.00</span>
                        </div>
                        <div class="w-10 h-10 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-center text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                        </div>
                    </div>
                    
                    <button type="submit" class="flex items-center justify-center gap-3 w-full py-5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl transition-all shadow-xl shadow-blue-500/20 transform hover:-translate-y-1 active:translate-y-0 leading-6 mt-4">
                        Proceed to Payment
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="p-10 text-center opacity-30 text-xs font-medium uppercase tracking-widest text-slate-600 leading-6">
        Secure Scheduling Gateway
    </footer>
</body>
</html>
