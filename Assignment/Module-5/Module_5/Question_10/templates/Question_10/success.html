<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Successful - Question 10</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        .icon { font-size: 60px; color: #42b72a; margin-bottom: 20px; }
        h1 { color: #1c1e21; margin-bottom: 10px; }
        p { color: #606770; margin-bottom: 30px; font-size: 18px; }
        .user-info { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 30px; text-align: left; }
        .user-info strong { color: #1c1e21; }
        .btn { display: inline-block; padding: 12px 25px; background-color: #1877f2; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; }
        .btn:hover { background-color: #166fe5; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✔</div>
        <h1>Successfully Verified!</h1>
        <p>You have successfully logged in using Google and verified your phone via Twilio OTP.</p>
        
        <div class="user-info">
            <p><strong>Email:</strong> {{ user.email }}</p>
            <p><strong>Name:</strong> {{ user.get_full_name }}</p>
        </div>

        <a href="/" class="btn">Return to Dashboard</a>
        <br><br>
        <form method="POST" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button type="submit" style="background:none; border:none; color: #606770; text-decoration: underline; cursor: pointer;">Logout</button>
        </form>
    </div>
</body>
</html>
