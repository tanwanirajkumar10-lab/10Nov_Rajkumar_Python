<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Fetcher - Question 14</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007bff;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
        }
        .weather-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { font-weight: 600; font-size: 28px; margin-bottom: 30px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 18px;
            border-radius: 12px;
            color: white;
            outline: none;
            font-family: inherit;
        }
        input::placeholder { color: rgba(255,255,255,0.6); }
        button {
            background: white;
            color: #764ba2;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.05); }
        
        .weather-info { margin-top: 30px; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .temp { font-size: 64px; font-weight: 300; margin: 10px 0; }
        .city { font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.9); }
        .desc { font-size: 16px; opacity: 0.8; text-transform: capitalize; }
        .details { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); }
        .detail-item { font-size: 14px; }
        .detail-item span { display: block; font-size: 18px; font-weight: 600; margin-top: 5px; }

        .error { background: #ff4757; padding: 10px; border-radius: 8px; font-size: 14px; margin-top: 20px; }
        .sample-badge { display: inline-block; background: #fbbf24; color: black; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 10px; margin-bottom: 10px; text-transform: uppercase; }
        .back-link { display: inline-block; margin-top: 30px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="weather-card">
        <h1>Weather Flux</h1>
        
        <form method="GET" class="search-box">
            <input type="text" name="city" placeholder="Enter city name..." required value="{{ city|default:'' }}">
            <button type="submit">Show</button>
        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        {% if weather %}
            <div class="weather-info">
                <div class="city">{{ city|title }}</div>
                <div class="desc">{{ weather.description }}</div>
                <div class="temp">{{ weather.temp }}°C</div>
                
                <div class="details">
                    <div class="detail-item">
                        Humidity
                        <span>{{ weather.humidity }}%</span>
                    </div>
                    <div class="detail-item">
                        Wind
                        <span>{{ weather.wind_speed }} km/h</span>
                    </div>
                </div>
            </div>
        {% endif %}

        <a href="/" class="back-link">&larr; Go Back To Dashboard</a>
    </div>
</body>
</html>
