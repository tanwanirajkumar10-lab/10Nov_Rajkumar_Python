<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account – SendGrid Integration</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #512da8;
            --accent: #ff4081;
            --bg: #f5f5f7;
        }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border: 1px solid #e0e0e0; }
        h1 { margin: 0 0 10px 0; font-size: 24px; font-weight: 600; text-align: center; color: var(--primary); }
        p.subtitle { text-align: center; color: #757575; font-size: 14px; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #424242; margin-bottom: 8px; }
        input { width: 100%; padding: 12px 15px; border: 1px solid #e0e0e0; border-radius: 10px; box-sizing: border-box; font-size: 15px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(81, 45, 168, 0.1); }
        
        button { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #4527a0; transform: translateY(-1px); }
        
        .errorlist { color: #d32f2f; font-size: 13px; list-style: none; padding: 0; margin: 10px 0; }
        .back-link { display: block; text-align: center; margin-top: 25px; color: #757575; text-decoration: none; font-size: 13px; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Join the Loop</h1>
        <p class="subtitle">Register now and receive a confirmation email powered by SendGrid.</p>
        
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        {{ field.errors }}
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit">Create Account</button>
        </form>

        <a href="/" class="back-link">&larr; Go Back To Dashboard</a>
    </div>
</body>
</html>
