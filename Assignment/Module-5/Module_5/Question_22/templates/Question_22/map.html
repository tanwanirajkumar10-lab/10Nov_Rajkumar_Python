<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Doctor Locations Map | Question 22</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header-bar {
            background-color: var(--card-bg);
            padding: 1.5rem 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1000; /* Above Leaflet controls */
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .header-title p {
            margin: 0.25rem 0 0 2.25rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .search-container {
            display: flex;
            gap: 0.5rem;
        }

        .search-input {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-size: 1rem;
            width: 300px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .search-btn {
            padding: 0.75rem 1.5rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-btn:hover {
            background-color: var(--primary-hover);
        }

        .map-container {
            flex: 1;
            position: relative;
            width: 100%;
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-color: #e5e7eb;
        }

        .loader-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(2px);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-window {
            padding: 5px;
            font-family: 'Inter', sans-serif;
            min-width: 180px;
        }
        .info-window h3 {
            margin: 0 0 5px 0;
            color: var(--primary);
            font-size: 1rem;
            font-weight: 700;
        }
        .info-window p {
            margin: 0 0 8px 0;
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
        }
        .info-window .tag {
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .back-nav {
            margin-top: 1.5rem;
            text-align: center;
        }

        .back-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
        }

        .back-nav a:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="header-title">
            <h1><i class="fa-solid fa-earth-asia"></i> Global Doctor Map</h1>
            <p>Powered by OpenStreetMap & Overpass API. Searching live healthcare data globally.</p>
        </div>
        
        <form method="GET" action="{% url 'q22_doctor_map' %}" class="search-container" id="searchForm">
            <input type="text" name="city" class="search-input" placeholder="Enter a city (e.g. Mumbai, New York)" value="{{ search_city }}" required>
            <button type="submit" class="search-btn"><i class="fa-solid fa-magnifying-glass"></i>&nbsp; Search</button>
            <a href="/" class="search-btn" style="background-color: #64748b; text-decoration: none;"><i class="fa-solid fa-house"></i></a>
        </form>
    </div>

    <div class="map-container">
        <div id="map"></div>
        
        <div class="loader-overlay" id="loader">
            <div class="spinner"></div>
            <p style="margin-top: 1rem; font-weight: 600; color: var(--text-main);">Searching for Doctors...</p>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        const searchedCity = "{{ search_city|escapejs }}";
        const loader = document.getElementById('loader');
        
        // Initialize Map
        const map = L.map('map').setView([20.5937, 78.9629], 5); // Default to India

        // Add CartoDB Positron Tile Layer (More reliable than standard OSM tiles)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        if (searchedCity) {
            searchDoctors(searchedCity);
        }

        async function searchDoctors(city) {
            loader.style.display = 'flex';
            try {
                // 1. Geocode City using Nominatim
                const geoResponse = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}`);
                const geoData = await geoResponse.json();

                if (geoData.length === 0) {
                    alert("City not found. Please try another name.");
                    loader.style.display = 'none';
                    return;
                }

                const { lat, lon, display_name } = geoData[0];
                const cityPos = [parseFloat(lat), parseFloat(lon)];
                
                map.setView(cityPos, 13);

                // 2. Search for Doctors/Hospitals/Clinics using Overpass API
                const overpassUrl = 'https://overpass-api.de/api/interpreter';
                const query = `
                    [out:json][timeout:25];
                    (
                      node["amenity"~"doctors|hospital|clinic"](around:10000, ${lat}, ${lon});
                      node["healthcare"~"doctor|hospital|clinic|hospital"](around:10000, ${lat}, ${lon});
                      way["amenity"~"doctors|hospital|clinic"](around:10000, ${lat}, ${lon});
                      way["healthcare"~"doctor|hospital|clinic|hospital"](around:10000, ${lat}, ${lon});
                    );
                    out center;
                `;

                const overpassResponse = await fetch(overpassUrl, {
                    method: 'POST',
                    body: query
                });
                const overpassData = await overpassResponse.json();

                // 3. Clear existing markers (except tile layer)
                map.eachLayer((layer) => {
                    if (layer instanceof L.Marker) {
                        map.removeLayer(layer);
                    }
                });

                // 4. Add new markers
                if (overpassData.elements.length === 0) {
                    alert(`No healthcare facilities found within 10km of ${city} center on OpenStreetMap data. Try a larger city or different search term.`);
                } else {
                    const markers = [];
                    overpassData.elements.forEach(el => {
                        const pos = el.center ? [el.center.lat, el.center.lon] : [el.lat, el.lon];
                        const name = el.tags.name || el.tags["name:en"] || "Healthcare Facility";
                        const type = el.tags.amenity || el.tags.healthcare || "Doctor";
                        const specialty = el.tags.speciality || el.tags.healthcare_speciality || "";
                        const address = el.tags["addr:full"] || el.tags["addr:street"] || city;
                        
                        const marker = L.marker(pos).addTo(map);
                        
                        const popupContent = `
                            <div class="info-window">
                                <h3>${name}</h3>
                                <p><i class="fa-solid fa-location-dot"></i> ${address}</p>
                                <span class="tag">${type.replace(/_/g, ' ')}</span>
                                ${specialty ? `<p style="margin-top:5px; font-style:italic;">${specialty}</p>` : ''}
                            </div>
                        `;
                        
                        marker.bindPopup(popupContent);
                        markers.push(pos);
                    });
                    
                    // Fit bounds to markers
                    if (markers.length > 1) {
                        const bounds = L.latLngBounds(markers);
                        map.fitBounds(bounds, { padding: [50, 50] });
                    }
                }

            } catch (error) {
                console.error("Search Error:", error);
                alert("An error occurred while fetching map data. Please try again.");
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
