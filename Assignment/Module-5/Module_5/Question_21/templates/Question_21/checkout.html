<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-body: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-gray: #64748b;
            --border-color: #e2e8f0;
            --accent-bg: #e0e7ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .checkout-card {
            background-color: var(--card-bg);
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            border: 1px solid rgba(226, 232, 240, 0.8);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 2.5rem 2rem;
            text-align: center;
            position: relative;
        }

        .doctor-avatar {
            width: 90px;
            height: 90px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            font-size: 2.5rem;
            color: var(--primary);
        }

        .header-title {
            margin: 0 0 0.5rem 0;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .header-subtitle {
            margin: 0;
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .card-body {
            padding: 2rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .info-row:last-of-type {
            border-bottom: none;
            padding-bottom: 0;
        }

        .info-label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-gray);
            font-weight: 500;
        }

        .info-label i {
            width: 20px;
            text-align: center;
            color: #8b5cf6;
        }

        .info-value {
            font-weight: 600;
            color: var(--text-dark);
            text-align: right;
        }

        .total-section {
            background-color: var(--bg-body);
            padding: 1.5rem;
            border-radius: 1rem;
            margin: 1.5rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-label {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-gray);
        }

        .total-amount {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .pay-btn {
            width: 100%;
            background-color: var(--text-dark);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 0.75rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .pay-btn:hover {
            background-color: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.15);
        }
        
        .stripe-badge {
            text-align: center;
            margin-top: 1rem;
            color: var(--text-gray);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .dashboard-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .dashboard-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="checkout-card">
        <div class="card-header">
            <div class="doctor-avatar">
                <i class="fa-solid fa-user-doctor"></i>
            </div>
            <h1 class="header-title">{{ doctor_name }}</h1>
            <p class="header-subtitle">Confirm your appointment</p>
        </div>

        <div class="card-body">
            <div class="info-row">
                <div class="info-label">
                    <i class="fa-regular fa-calendar-check"></i>
                    <span>Date & Time</span>
                </div>
                <div class="info-value">{{ appointment_time }}</div>
            </div>

            <div class="info-row">
                <div class="info-label">
                    <i class="fa-solid fa-stethoscope"></i>
                    <span>Service</span>
                </div>
                <div class="info-value">General Consultation</div>
            </div>

            <div class="total-section">
                <span class="total-label">Total to Pay</span>
                <span class="total-amount">&#8377;{{ consultation_fee }}</span>
            </div>

            <form action="{% url 'q21_create_checkout_session' %}" method="POST">
                {% csrf_token %}
                <button type="submit" class="pay-btn">
                    <span>Pay with Stripe</span>
                    <i class="fa-brands fa-stripe-s"></i>
                </button>
            </form>

            <div class="stripe-badge">
                <i class="fa-solid fa-lock"></i>
                <span>Payments are secure and encrypted</span>
            </div>
            
            <a href="{% url 'home' %}" class="dashboard-link">
                <i class="fas fa-arrow-left"></i> Cancel and Return
            </a>
        </div>
    </div>

</body>
</html>
