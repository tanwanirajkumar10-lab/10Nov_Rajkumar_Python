<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --error: #ef4444;
            --error-dark: #dc2626;
            --bg-body: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-gray: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .status-card {
            background-color: var(--card-bg);
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            padding: 3rem 2rem;
            text-align: center;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .icon-circle {
            width: 100px;
            height: 100px;
            background-color: #fee2e2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: var(--error);
            font-size: 3rem;
            box-shadow: 0 0 0 15px rgba(239, 68, 68, 0.1);
        }

        .title {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .message {
            color: var(--text-gray);
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            flex-direction: column;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .btn-primary {
            background-color: var(--text-dark);
            color: white;
        }

        .btn-primary:hover {
            background-color: #1e293b;
        }
        
        .btn-secondary {
            background-color: transparent;
            color: var(--text-gray);
            border: 1px solid #cbd5e1;
        }

        .btn-secondary:hover {
            background-color: #f1f5f9;
            color: var(--text-dark);
        }
    </style>
</head>
<body>

    <div class="status-card">
        <div class="icon-circle">
            <i class="fa-solid fa-xmark"></i>
        </div>
        
        <h1 class="title">Payment Cancelled</h1>
        <p class="message">Your payment was not completed, and you have not been charged. The appointment has not been booked.</p>
        
        <div class="btn-group">
            <a href="{% url 'q21_checkout' %}" class="btn btn-primary">Try Again</a>
            <a href="{% url 'home' %}" class="btn btn-secondary">Go Back To Dashboard</a>
        </div>
    </div>

</body>
</html>
