<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>GeoPoint – Address to Coordinates</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #10b981;
            --bg: #f9fafb;
            --text: #1f2937;
            --border: #e5e7eb;
        }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text); padding: 40px; margin: 0; display: flex; justify-content: center; min-height: 100vh; align-items: flex-start; }
        
        .container { width: 100%; max-width: 900px; display: grid; grid-template-columns: 400px 1fr; gap: 30px; }
        
        .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        h1 { margin: 0 0 10px 0; font-size: 28px; font-weight: 600; color: var(--primary); display: flex; align-items: center; gap: 12px; }
        p.subtitle { color: #6b7280; font-size: 15px; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 25px; }
        input { width: 100%; padding: 14px 18px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        
        button { width: 100%; padding: 15px; background-color: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #4338ca; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
        
        .result { margin-top: 30px; background: #f5f3ff; padding: 25px; border-radius: 16px; border: 1px solid #c7d2fe; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .result h2 { margin: 0 0 15px 0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #4338ca; }
        .address-text { font-size: 15px; font-weight: 600; margin-bottom: 20px; color: #111827; line-height: 1.4; }
        .coords { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .coord-box { background: white; padding: 12px; border-radius: 10px; border: 1px solid #e0e7ff; }
        .coord-box label { font-size: 11px; color: #6b7280; display: block; margin-bottom: 3px; }
        .coord-box .value { font-size: 16px; font-weight: 600; color: var(--secondary); font-family: monospace; }
        
        .map-card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--border); position: relative; height: 100%; min-height: 500px; }
        #map { width: 100%; height: 100%; }
        
        .error { margin-top: 20px; padding: 12px; background: #fee2e2; color: #991b1b; border-radius: 10px; font-size: 14px; text-align: center; }
        .back-link { display: block; text-align: center; margin-top: 30px; color: #6b7280; text-decoration: none; font-size: 14px; }
        .back-link:hover { color: var(--primary); text-decoration: underline; }

        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; }
            .map-card { height: 400px; min-height: 400px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="card">
                <h1><i class="fa-solid fa-location-crosshairs"></i> GeoPoint</h1>
                <p class="subtitle">Convert any physical address into precise geographic coordinates using OpenStreetMap.</p>
                
                <form method="GET">
                    <div class="form-group">
                        <input type="text" name="address" placeholder="e.g. 10 Downing Street, London" required value="{{ address|default:'' }}">
                    </div>
                    <button type="submit">Lookup Coordinates</button>
                </form>

                {% if error %}
                    <div class="error">{{ error }}</div>
                {% endif %}

                {% if result %}
                    <div class="result">
                        <h2>Geocoded Result</h2>
                        <div class="address-text">{{ result.formatted_address }}</div>
                        <div class="coords">
                            <div class="coord-box">
                                <label>Latitude</label>
                                <div class="value">{{ result.lat }}</div>
                            </div>
                            <div class="coord-box">
                                <label>Longitude</label>
                                <div class="value">{{ result.lng }}</div>
                            </div>
                        </div>
                    </div>
                {% endif %}

                <a href="/" class="back-link">&larr; Go Back To Dashboard</a>
            </div>
        </div>

        <div class="map-card">
            <div id="map"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        const lat = parseFloat("{{ result.lat|default:'20.5937' }}");
        const lng = parseFloat("{{ result.lng|default:'78.9629' }}");
        const hasResult = {% if result %}true{% else %}false{% endif %};

        // Initialize Map
        const map = L.map('map').setView([lat, lng], hasResult ? 15 : 5);

        // Add CartoDB Positron Tile Layer
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors © CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        if (hasResult) {
            L.marker([lat, lng]).addTo(map)
                .bindPopup("<b>Geocoded Location</b><br>{{ result.formatted_address|escapejs }}")
                .openPopup();
        }
    </script>
</body>
</html>
