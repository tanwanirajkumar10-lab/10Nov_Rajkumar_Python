{% extends "base.html" %}

{% block title %}404 - Page Not Found | WriteSphere{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75 mt-5">
    <div class="col-md-6 text-center">
        <div class="error-template">
            <h1 class="display-1 fw-bold text-primary mb-0">404</h1>
            <div class="error-illustration mb-4">
                <i class="bi bi-search text-secondary" style="font-size: 5rem;"></i>
            </div>
            <h2 class="h3 mb-3 fw-bold">Oops! Page Not Found</h2>
            <p class="text-muted mb-4 lead">
                The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
            </p>
            <div class="error-actions d-flex justify-content-center gap-3">
                <a href="{% url 'writesphere:home' %}" class="btn btn-primary px-4 py-2 shadow-sm">
                    <i class="bi bi-house-door me-2"></i> Take Me Home
                </a>
                <button onclick="history.back()" class="btn btn-outline-secondary px-4 py-2 shadow-sm">
                    <i class="bi bi-arrow-left me-2"></i> Go Back
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    .min-vh-75 { min-vh-75: height: 75vh; }
    .error-template {
        padding: 40px 15px;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .display-1 {
        letter-spacing: -2px;
        opacity: 0.9;
    }
    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
    }
    .error-illustration i {
        display: inline-block;
        animation: float 3s ease-in-out infinite;
    }
</style>
{% endblock %}
