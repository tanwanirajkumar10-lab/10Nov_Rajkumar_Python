{% extends "base.html" %}

{% block title %}500 - Server Error | WriteSphere{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75 mt-5">
    <div class="col-md-6 text-center">
        <div class="error-template">
            <h1 class="display-1 fw-bold text-danger mb-0">500</h1>
            <div class="error-illustration mb-4">
                <i class="bi bi-exclamation-triangle text-warning" style="font-size: 5rem;"></i>
            </div>
            <h2 class="h3 mb-3 fw-bold">Internal Server Error</h2>
            <p class="text-muted mb-4 lead">
                Something went wrong on our end. We're looking into it! Please try refreshing the page or come back later.
            </p>
            <div class="error-actions d-flex justify-content-center gap-3">
                <a href="{% url 'writesphere:home' %}" class="btn btn-primary px-4 py-2 shadow-sm">
                    <i class="bi bi-house-door me-2"></i> Take Me Home
                </a>
                <button onclick="location.reload()" class="btn btn-outline-secondary px-4 py-2 shadow-sm">
                    <i class="bi bi-arrow-clockwise me-2"></i> Try Again
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    .min-vh-75 { min-vh-75: height: 75vh; }
    .error-template {
        padding: 40px 15px;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .display-1 {
        letter-spacing: -2px;
        opacity: 0.9;
    }
    @keyframes shake {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(5deg); }
        75% { transform: rotate(-5deg); }
    }
    .error-illustration i {
        display: inline-block;
        animation: shake 0.5s ease-in-out infinite alternate;
    }
</style>
{% endblock %}
